<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CX팀 리소스 캘린더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="loginScreen" class="login-screen" hidden>
    <div class="login-card">
      <h1>CX팀 리소스 캘린더</h1>
      <p>팀 개인시간 관리를 위해 로그인해 주세요.</p>
      <button id="googleLoginBtn" class="google-btn">
        <span class="g-icon">G</span> Google 계정으로 로그인
      </button>
      <p id="loginError" class="login-error" hidden></p>
    </div>
  </div>

  <div id="app" hidden>
    <!-- 상단 바 -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="logo">CX팀 리소스 캘린더</h1>
        <div class="view-toggle" id="viewToggle">
          <button data-view="daily">데일리</button>
          <button data-view="weekly">주간</button>
          <button data-view="monthly" class="active">월간</button>
        </div>
      </div>

      <div class="topbar-center">
        <button class="nav-btn" id="prevBtn" aria-label="이전">&lsaquo;</button>
        <span class="date-label" id="dateLabel">—</span>
        <button class="nav-btn" id="nextBtn" aria-label="다음">&rsaquo;</button>
        <button class="today-btn" id="todayBtn">오늘</button>
      </div>

      <div class="topbar-right">
        <span class="mode-badge" id="modeBadge" title="데이터 저장 위치">···</span>
        <span class="account" id="account" hidden></span>
        <button class="refresh-btn" id="logoutBtn" hidden>로그아웃</button>
        <button class="refresh-btn" id="refreshBtn">⟳ 새로고침</button>
      </div>
    </header>

    <div class="body">
      <!-- 좌: 시간표 -->
      <main class="grid-wrap">
        <div class="legend">
          <span class="lg lg-short">부족</span>
          <span class="lg lg-p1">+1 여유</span>
          <span class="lg lg-p2">+2 여유</span>
          <span class="lg lg-full">마감</span>
          <span class="legend-note">필요 대비 투입 가능 인원 비교</span>
        </div>
        <div class="grid-scroll" id="gridScroll">
          <div id="grid" class="grid"></div>
        </div>

        <!-- 저장 바 (선택 중일 때) -->
        <div id="saveBar" class="save-bar" hidden>
          <span id="saveBarText">선택한 시간 0개</span>
          <div class="save-bar-actions">
            <button id="cancelSelBtn" class="ghost-btn">취소</button>
            <button id="saveSelBtn" class="primary-btn">사유 입력하고 저장</button>
          </div>
        </div>
      </main>

      <!-- 우: 사이드 패널 -->
      <aside class="side">
        <!-- 이름 미선택 -->
        <section class="panel" id="memberPanel">
          <h2 class="panel-title" id="memberPanelTitle">나는 누구?</h2>
          <p class="panel-sub" id="memberPanelSub">이름을 선택하면 시간대를 눌러 개인시간을 신청할 수 있어요.</p>
          <div class="member-picker" id="memberPicker"></div>
        </section>

        <!-- 이름 선택 후 환영 박스 -->
        <section class="panel welcome-box" id="welcomeBox" hidden>
          <div class="avatar" id="wbAvatar"></div>
          <div class="wb-text"><strong id="wbName"></strong>님, 환영합니다! <span id="wbRole" class="role-badge" hidden></span></div>
          <button id="changeUserBtn" class="link-btn">이름 바꾸기</button>
        </section>

        <section class="panel" id="myPanel" hidden>
          <h2 class="panel-title"><span id="myPanelTitle">내 개인시간 신청</span> <span class="count" id="myCount">0</span></h2>
          <p class="panel-sub" id="myBlocksHint">표시된 기간에 신청한 시간이 없습니다.</p>
          <ul class="my-blocks" id="myBlocks"></ul>
        </section>

        <section class="panel" id="teamPanel">
          <h2 class="panel-title">팀원</h2>
          <ul class="member-legend" id="memberLegend"></ul>
        </section>
      </aside>
    </div>
  </div>

  <!-- 사유 입력 모달 -->
  <div id="reasonModal" class="modal-overlay" hidden>
    <div class="modal">
      <h3>개인시간 사유</h3>
      <p id="reasonSummary" class="modal-sub"></p>
      <textarea id="reasonInput" rows="3" placeholder="예) ALF 심화교육 서포트 / 알프 심화 교육 오프라인 운영 준비"></textarea>
      <p id="reasonError" class="modal-error" hidden>사유를 입력해 주세요.</p>
      <div class="modal-actions">
        <button id="reasonCancel" class="ghost-btn">취소</button>
        <button id="reasonConfirm" class="primary-btn">저장</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
